apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-argocd
  namespace: mcp-argocd
  labels:
    app.kubernetes.io/name: mcp-argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-argocd
  template:
    metadata:
      labels:
        app: mcp-argocd
        app.kubernetes.io/name: mcp-argocd
    spec:
      containers:
        - name: mcp-argocd
          # Build: docker build -t YOUR_REGISTRY/mcp-argocd:latest .
          image: mcp-argocd:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ARGOCD_BASE_URL
              value: "https://argocd.example.com"
            - name: ARGOCD_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcp-argocd-credentials
                  key: argocd_api_token
            # Optional: self-signed Argo CD — dev only
            # - name: NODE_TLS_REJECT_UNAUTHORIZED
            #   value: "0"
            # Optional: read-only MCP tools
            # - name: MCP_READ_ONLY
            #   value: "true"
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
