# Example only — do not commit real tokens.
# Create a real secret:
#   kubectl -n mcp-argocd create secret generic mcp-argocd-credentials \
#     --from-literal=argocd_api_token='YOUR_TOKEN'
#
apiVersion: v1
kind: Secret
metadata:
  name: mcp-argocd-credentials
  namespace: mcp-argocd
type: Opaque
stringData:
  argocd_api_token: "REPLACE_WITH_ARGOCD_API_TOKEN"
